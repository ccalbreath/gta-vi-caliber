name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GODOT_VERSION: "4.6.3"

jobs:
  lint:
    name: Format & lint (GDScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"
      - name: gdformat --check
        run: gdformat --check game/scripts game/tests
      - name: gdlint
        run: gdlint game/scripts game/tests

  game:
    name: Full game gate (headless Godot)
    runs-on: ubuntu-latest
    steps:
      # Do NOT let checkout smudge LFS here: a plain `lfs: true` re-downloads the
      # whole asset set on every run, which exhausts the repo's monthly LFS
      # bandwidth and then leaves pointer files behind (every .glb preload fails).
      # Instead leave pointers in place, restore the objects from cache, and only
      # hit the LFS endpoint on a cache miss (with a retry for transient throttling).
      - uses: actions/checkout@v4
        with:
          lfs: false
      - name: Build LFS object manifest
        run: git lfs ls-files --long | cut -d' ' -f1 | sort > .lfs-manifest
      - name: Cache LFS objects
        uses: actions/cache@v4
        with:
          path: .git/lfs/objects
          key: lfs-objects-${{ hashFiles('.lfs-manifest') }}
          restore-keys: |
            lfs-objects-
      - name: Fetch LFS objects (cache miss only) and materialize
        run: |
          for attempt in 1 2 3; do
            if git lfs pull; then break; fi
            echo "git lfs pull failed (attempt ${attempt}); backing off..."
            sleep $((attempt * 15))
          done
          git lfs checkout
      - name: Verify LFS assets materialized
        run: |
          # Fail loudly here (clear message) rather than deep in a parse error if
          # the objects are still pointers.
          if git lfs ls-files | grep -q '^[0-9a-f]* -'; then
            echo "::error::Some LFS objects are still pointers after pull (bandwidth quota?)."
            git lfs ls-files | grep '^[0-9a-f]* -' | head
            exit 1
          fi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install gdtoolkit
        run: pip install "gdtoolkit==4.*"
      - name: Cache Godot
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64
      - name: Download Godot
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          curl -sSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          mv "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" ~/godot-bin/godot
          chmod +x ~/godot-bin/godot
      - name: Run full game gate
        run: GODOT=~/godot-bin/godot tools/check.sh

  engine:
    name: Engine modules (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            os: ubuntu-latest
          - platform: macos
            os: macos-latest
          - platform: windows
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install SCons
        run: pip install scons
      - name: Cache godot-cpp build
        uses: actions/cache@v4
        with:
          path: |
            engine/godot-cpp/bin
            engine/godot-cpp/gen
            engine/godot-cpp/src
            engine/.sconsign.dblite
          key: godot-cpp-${{ matrix.platform }}-${{ hashFiles('.gitmodules', 'engine/godot-cpp/SConstruct') }}
      - name: Build (template_debug)
        working-directory: engine
        run: scons platform=${{ matrix.platform }} target=template_debug
      - name: Cache Godot
        if: matrix.platform == 'linux'
        id: cache-godot-engine
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64
      - name: Download Godot
        if: matrix.platform == 'linux' && steps.cache-godot-engine.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          curl -sSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot
          mv "/tmp/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" ~/godot-bin/godot
          chmod +x ~/godot-bin/godot
      # Import WITHOUT the manifest installed: `--import` boots the full
      # editor, whose shutdown path is unrelated to what we are testing.
      - name: Headless import
        if: matrix.platform == 'linux'
        run: ~/godot-bin/godot --headless --path game --import
      - name: Install native manifest
        if: matrix.platform == 'linux'
        run: cp engine/worldcore.gdextension.example game/bin/worldcore.gdextension
      - name: Native smoke test
        if: matrix.platform == 'linux'
        run: ~/godot-bin/godot --headless --path game --script res://tests/native_smoke_test.gd
